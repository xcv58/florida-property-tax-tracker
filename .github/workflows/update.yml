name: Automated tracker update

on:
  workflow_dispatch:
  schedule:
    - cron: "15 10 * * *"
    - cron: "30 10 * * 1"

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run automated update
        run: npm run update:auto

      - name: Commit changes if any
        run: |
          git config user.name "florida-property-tax-tracker-bot"
          git config user.email "actions@github.com"
          git add data public/archive reports public/search-index.json
          git diff --cached --quiet || git commit -m "Automated tracker update"

      - name: Push changes
        run: git push

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Automated tracker update failed",
              body: "The automated update workflow failed. Review the GitHub Actions logs and source validation output."
            })
