name: Bug report
description: Report a website, automation, or accessibility problem.
title: "Bug: "
labels: ["needs-review"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
